name: refresh-data

on:
  workflow_dispatch:
  schedule:
    - cron: "30 11 * * *"   # daily 11:30 UTC

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Regenerate data feeds
        env:
          CENSUS_API_KEY: ${{ secrets.CENSUS_API_KEY }}
        run: |
          cd scripts
          python build_bead.py
          python build_satellite.py
          python build_longhaul.py
          python fetch_broadband_adoption.py
      - name: Validate JSON
        run: python -c "import json,glob;[json.load(open(f)) for f in glob.glob('data/*.json')];print('ok')"
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): refresh public feeds"
            git push
          fi
